<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <title>FineStamp</title>
    <!-- เพิ่ม viewport-fit=cover เพื่อให้เต็มจอจนถึงขอบ (Notch) ของ iPhone -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <base target="_top">

    <link rel="manifest" href="./FineStampApp_manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FineStamp">
    <link rel="apple-touch-icon" href="https://img2.pic.in.th/FineStamp-logo-for-ios.png">

    <meta name="theme-color" content="#0d9488">

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background-color: #f1f5f9;
            /* ป้องกันการ Scroll เด้ง (Bouncing) บน iOS */
            overscroll-behavior: none; 
        }
        
        iframe {
            /* เปลี่ยนจาก fixed เป็น absolute ช่วยแก้บั๊กบน Webview/PWA ของ iOS ได้ดีกว่า */
            position: absolute; 
            top: 0; left: 0; bottom: 0; right: 0;
            width: 100%; height: 100%;
            border: none; margin: 0; padding: 0;
            overflow: hidden; z-index: 10;
        }
        
        #splashScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
            z-index: 999999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* ปรับ transition ให้สมูทขึ้น */
            transition: opacity 0.8s ease-in-out, visibility 0.8s ease-in-out;
            color: white;
            font-family: 'Prompt', sans-serif;
        }
        
        .logo-container {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
            margin-bottom: 24px;
            animation: pulse-soft 2s infinite;
        }
        
        .logo-container img {
            width: 80%;
            height: auto;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-top: 30px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body>

    <div id="splashScreen">
        <div class="logo-container">
            <img src="https://img2.pic.in.th/FineStamp---Logo-bg-remove.png" alt="FineStamp Logo" onerror="this.src=''">
        </div>
        <h1 style="font-size: 24px; margin:0; font-weight: bold; letter-spacing: 1px;">FineStamp</h1>
        <p style="font-size: 14px; opacity: 0.8; margin-top: 5px;">กำลังเชื่อมต่อระบบ...</p>
        <div class="spinner"></div>
    </div>

    <!-- นำ onload ออกจาก iframe เพื่อใช้ Script ควบคุมแทน -->
    <iframe 
        id="gasIframe"
        src="https://script.google.com/macros/s/AKfycbyywqSixglUsUJ2zO_M6lET-_KbRkdu8F-UECgZZaVkywCLd-TOfmAq-Hj13J1w51vr/exec"
        allow="geolocation; microphone; camera"
    ></iframe>

    <script>
        // จดจำเวลาเริ่มเปิด App
        const appStartTime = Date.now();
        let isSplashHidden = false;

        function hideSplashScreen() {
            if (isSplashHidden) return;
            isSplashHidden = true;
            
            const splash = document.getElementById('splashScreen');
            
            // ตรวจสอบว่า Splash Screen โชว์มาแล้วอย่างน้อย 2 วินาทีหรือไม่ (เพื่อความสวยงาม ไม่กระพริบ)
            const elapsedTime = Date.now() - appStartTime;
            const minDisplayTime = 2000; 
            const remainingWait = Math.max(0, minDisplayTime - elapsedTime);

            setTimeout(() => {
                splash.style.opacity = '0';
                splash.style.visibility = 'hidden';
                setTimeout(() => {
                    splash.style.display = 'none';
                }, 800);
            }, remainingWait);
        }

        // วิธีที่ 1: ดักจับจาก Event Onload (ดีเลย์เผื่อ GAS Redirect)
        document.getElementById('gasIframe').addEventListener('load', function() {
            // เมื่อ iframe สั่ง load ให้รออีกนิดเพื่อให้แน่ใจว่าโหลด DOM เสร็จจริงๆ
            setTimeout(hideSplashScreen, 1500); 
        });

        // วิธีที่ 2 (Advance): ดักจับข้อความจากภายใน GAS (ทำงานประสานกัน 100%)
        window.addEventListener('message', function(event) {
            if (event.data === 'FINESTAMP_READY') {
                hideSplashScreen();
            }
        });

        // วิธีที่ 3 (Fallback): ป้องกันเคสเน็ตช้ามากๆ หรือโหลดไม่ขึ้น จะซ่อนอัติโนมัติใน 8 วินาที
        setTimeout(hideSplashScreen, 8000);
    </script>

</body>
</html>
