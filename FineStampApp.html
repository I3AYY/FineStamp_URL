<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <title>FineStamp</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, user-scalable=no">
    <base target="_top">

    <link rel="manifest" href="./FineStampApp_manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FineStamp">
    <link rel="apple-touch-icon" href="https://img2.pic.in.th/FineStamp-logo-for-ios.png">

    <meta name="theme-color" content="#0d9488">

    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f1f5f9;
        }
        iframe {
            position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            width: 100%; height: 100%;
            border: none; margin: 0; padding: 0;
            overflow: hidden; z-index: 99;
        }
        
        /* สไตล์สำหรับ Splash Screen บังหน้าจอขาวระหว่างเชื่อมต่อ Google Script */
        #splashScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
            z-index: 999999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease-in-out;
            color: white;
            font-family: 'Prompt', sans-serif;
        }
        
        .logo-container {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
            margin-bottom: 24px;
            animation: pulse-soft 2s infinite;
        }
        
        .logo-container img {
            width: 80%;
            height: auto;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-top: 30px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body>

    <!-- Splash Screen: แสดงทันทีที่เปิดแอพขึ้นมา (ก่อนที่ iframe ของ Google จะโหลดเสร็จ) -->
    <div id="splashScreen">
        <div class="logo-container">
            <img src="https://img2.pic.in.th/FineStamp---Logo-bg-remove.png" alt="FineStamp Logo">
        </div>
        <h1 style="font-size: 24px; margin:0; font-weight: bold; letter-spacing: 1px;">FineStamp</h1>
        <p style="font-size: 14px; opacity: 0.8; margin-top: 5px;">กำลังเตรียมระบบ...</p>
        <div class="spinner"></div>
    </div>

    <!-- Iframe ของ Google Apps Script พร้อมใส่ Event onload -->
    <iframe 
        src="https://script.google.com/macros/s/AKfycbyywqSixglUsUJ2zO_M6lET-_KbRkdu8F-UECgZZaVkywCLd-TOfmAq-Hj13J1w51vr/exec"
        allow="geolocation; microphone; camera"
        onload="hideSplashScreen()"
    ></iframe>

    <script>
        // ฟังก์ชันสั่งซ่อน Splash Screen หลังจาก Iframe โหลดเสร็จสมบูรณ์
        function hideSplashScreen() {
            const splash = document.getElementById('splashScreen');
            // หน่วงเวลาอีกนิดนึงให้การวาดหน้า UI ของ Google script เสร็จชัวร์ๆ
            setTimeout(() => {
                splash.style.opacity = '0';
                // ลบออกจาก DOM หลังจาก fade out เสร็จ
                setTimeout(() => {
                    splash.style.display = 'none';
                }, 800);
            }, 500);
        }
    </script>

</body>
</html>
