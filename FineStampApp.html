<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <title>FineStamp</title>
    <!-- เพิ่ม viewport-fit=cover เพื่อให้เต็มจอจนถึงขอบ (Notch) ของ iPhone -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <base target="_top">

    <link rel="manifest" href="./FineStampApp_manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FineStamp">
    <link rel="apple-touch-icon" href="https://img2.pic.in.th/FineStamp-logo-for-ios.png">

    <!-- สีพื้นหลังนี้จะไปปรากฏตรงแถบ Status bar ด้านบน -->
    <meta name="theme-color" content="#f1f5f9"> 

    <style>
        body, html {
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #f1f5f9;
            overscroll-behavior: none; 
        }
        
        iframe {
            display: block; /* บังคับให้ iframe แสดงผลเป็น Block ป้องกันช่องว่างแปลกๆ */
            position: absolute; 
            
            /* เว้นระยะด้านบนและซ้ายตามรอยบากของ iOS (ถ้าเป็น Android หรือไม่มีรอยบาก ค่าจะเป็น 0px) */
            top: env(safe-area-inset-top, 0px); 
            left: env(safe-area-inset-left, 0px); 
            
            /* คำนวณความกว้าง/ความสูง ให้เต็ม 100% แล้วหักลบด้วยขอบปลอดภัยของจอ */
            width: calc(100% - env(safe-area-inset-left, 0px) - env(safe-area-inset-right, 0px));
            height: calc(100% - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px));
            
            border: none; 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            z-index: 10;
        }
        
        #splashScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
            z-index: 999999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease-in-out, visibility 0.8s ease-in-out;
            color: white;
            font-family: 'Prompt', sans-serif;
            /* ป้องกันเนื้อหาใน Splash screen ชนรอยบาก */
            padding-top: env(safe-area-inset-top, 0px);
            padding-bottom: env(safe-area-inset-bottom, 0px);
            box-sizing: border-box;
        }
        
        .logo-container {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
            margin-bottom: 24px;
            animation: pulse-soft 2s infinite;
        }
        
        .logo-container img {
            width: 80%;
            height: auto;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-top: 30px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body>

    <div id="splashScreen">
        <div class="logo-container">
            <img src="https://img2.pic.in.th/FineStamp---Logo-bg-remove.png" alt="FineStamp Logo" onerror="this.src=''">
        </div>
        <h1 style="font-size: 24px; margin:0; font-weight: bold; letter-spacing: 1px;">FineStamp</h1>
        <p style="font-size: 14px; opacity: 0.8; margin-top: 5px;">กำลังเชื่อมต่อระบบ...</p>
        <div class="spinner"></div>
    </div>

    <iframe 
        id="gasIframe"
        src="https://script.google.com/macros/s/AKfycbyywqSixglUsUJ2zO_M6lET-_KbRkdu8F-UECgZZaVkywCLd-TOfmAq-Hj13J1w51vr/exec"
        allow="geolocation; microphone; camera"
    ></iframe>

    <script>
        const appStartTime = Date.now();
        let isSplashHidden = false;

        function hideSplashScreen() {
            if (isSplashHidden) return;
            isSplashHidden = true;
            
            const splash = document.getElementById('splashScreen');
            const elapsedTime = Date.now() - appStartTime;
            const minDisplayTime = 2000; 
            const remainingWait = Math.max(0, minDisplayTime - elapsedTime);

            setTimeout(() => {
                splash.style.opacity = '0';
                splash.style.visibility = 'hidden';
                setTimeout(() => {
                    splash.style.display = 'none';
                }, 800);
            }, remainingWait);
        }

        document.getElementById('gasIframe').addEventListener('load', function() {
            setTimeout(hideSplashScreen, 1500); 
        });

        window.addEventListener('message', function(event) {
            if (event.data === 'FINESTAMP_READY') {
                hideSplashScreen();
            }
        });

        setTimeout(hideSplashScreen, 8000);
    </script>

</body>
</html>
